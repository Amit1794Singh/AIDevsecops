name: Run sonar cube with maven
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: setup jdk v4
        uses: actions/setup-java4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven
      - name: Build with Maven cloud
        run: mvn -B verify sonar:sonar -Dsonar.projectkey=DevsecopsAI_DevsecopsAI  -Dsonar.organization=DevsecopsAI -Dsonar.host.url=https://sonar.cloud.io -Dsonar.Token=$SONAR
       
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
